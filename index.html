<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luca Sciamanna — SSC Swim Times</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <img src="assets/tiger-shark.svg" alt="Springfield Swim Club Tiger Shark" class="mascot" />
      <div class="hero-text">
        <h1>Luca Sciamanna</h1>
        <p class="subtitle">Springfield Swim Club <span class="dot">•</span> Tiger Sharks</p>
      </div>
    </div>
    <div class="wave-wrap" aria-hidden="true">
      <svg class="wave wave-back" viewBox="0 0 2400 60" preserveAspectRatio="none">
        <path d="M0,30 C150,60 350,0 600,30 C850,60 1050,0 1200,30 C1350,60 1550,0 1800,30 C2050,60 2250,0 2400,30 L2400,60 L0,60 Z"></path>
      </svg>
      <svg class="wave wave-front" viewBox="0 0 2400 60" preserveAspectRatio="none">
        <path d="M0,20 C150,50 350,-10 600,20 C850,50 1050,-10 1200,20 C1350,50 1550,-10 1800,20 C2050,50 2250,-10 2400,20 L2400,60 L0,60 Z"></path>
      </svg>
    </div>
  </header>

  <main>
    <section id="pr-board" class="pr-board" aria-label="Personal bests">
      <h2>Personal Bests</h2>
      <div id="pr-cards" class="pr-cards"></div>
    </section>

    <section class="controls" aria-label="Search and filter">
      <input id="search" type="search" placeholder="Search events, opponents..." aria-label="Search" />
      <select id="stroke-filter" aria-label="Filter by stroke">
        <option value="">All Strokes</option>
      </select>
      <select id="sort-order" aria-label="Sort order">
        <option value="desc">Newest first</option>
        <option value="asc">Oldest first</option>
      </select>
    </section>

    <section id="meets" class="meets" aria-label="Meet history"></section>
  </main>

  <footer>
    <p>Data pulled from the <a href="https://www.delcoswimmingdivingleague.com/page/swimming/custom-page" target="_blank" rel="noopener">Delco Swimming &amp; Diving League</a>. Updated automatically every Saturday.</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
